<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"> <defs> <!-- Background Gradient --> <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"> <stop offset="0%" stop-color="#1F2937"/> <stop offset="100%" stop-color="#0F172A"/> </linearGradient> <!-- Glow Effect --> <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"> <feGaussianBlur stdDeviation="6" result="blur"/> <feMerge> <feMergeNode in="blur"/> <feMergeNode in="SourceGraphic"/> </feMerge> </filter> </defs> <!-- Rounded Background --> <rect x="8" y="8" width="240" height="240" rx="40" fill="url(#bg)"/> <!-- Subtle Grid --> <g stroke="#1E293B" stroke-width="1" opacity="0.3"> <line x1="64" y1="32" x2="64" y2="224"/> <line x1="128" y1="32" x2="128" y2="224"/> <line x1="192" y1="32" x2="192" y2="224"/> <line x1="32" y1="64" x2="224" y2="64"/> <line x1="32" y1="128" x2="224" y2="128"/> <line x1="32" y1="192" x2="224" y2="192"/> </g> <!-- Stylized X --> <g filter="url(#glow)" stroke="#22D3EE" stroke-width="18" stroke-linecap="round"> <line x1="80" y1="80" x2="176" y2="176"/> <line x1="176" y1="80" x2="80" y2="176"/> </g> </svg>